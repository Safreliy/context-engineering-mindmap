<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Эволюция контекстной инженерии для ИИ-агентов</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #08111d;
    --bg-2: #0f1c2b;
    --glass: rgba(13, 28, 43, 0.72);
    --glass-2: rgba(16, 38, 58, 0.82);
    --line: rgba(151, 201, 255, 0.14);
    --ink: #eef5ff;
    --muted: #9bb0c5;
    --accent: #7dd3fc;
    --accent-2: #5eead4;
    --accent-3: #c4b5fd;
    --warn: #fda4af;
    --good: #86efac;
    --mono: "IBM Plex Mono", monospace;
    --sans: "IBM Plex Sans", sans-serif;
    --shadow: 0 30px 90px rgba(0, 0, 0, 0.28);
  }

  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background:
      radial-gradient(circle at 18% 18%, rgba(94, 234, 212, 0.12), transparent 22%),
      radial-gradient(circle at 82% 22%, rgba(125, 211, 252, 0.14), transparent 24%),
      radial-gradient(circle at 76% 82%, rgba(196, 181, 253, 0.1), transparent 20%),
      linear-gradient(180deg, #07101a 0%, #0c1725 48%, #07101a 100%);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(151, 201, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(151, 201, 255, 0.03) 1px, transparent 1px);
    background-size: 34px 34px;
    mask-image: radial-gradient(circle at center, black 34%, transparent 100%);
  }

  .deck { position: relative; width: 100%; height: 100%; }
  .slide {
    position: absolute;
    inset: 0;
    padding: 52px 72px 72px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 22px;
    opacity: 0;
    pointer-events: none;
    transform: translateX(64px);
    transition: opacity .45s ease, transform .45s ease;
    overflow-y: auto;
  }
  .slide.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
  .slide.exit-left { opacity: 0; transform: translateX(-64px); }
  .slide.exit-right { opacity: 0; transform: translateX(64px); }
  .slide.enter-left { transform: translateX(-64px); }

  .slide > .anim {
    opacity: 0;
    transform: translateY(18px);
    transition: opacity .5s ease, transform .5s ease;
  }
  .slide.active > .anim { opacity: 1; transform: translateY(0); }
  .slide.active > .anim:nth-child(1) { transition-delay: .05s; }
  .slide.active > .anim:nth-child(2) { transition-delay: .14s; }
  .slide.active > .anim:nth-child(3) { transition-delay: .24s; }
  .slide.active > .anim:nth-child(4) { transition-delay: .34s; }
  .slide.active > .anim:nth-child(5) { transition-delay: .44s; }

  h1, h2, h3, p { margin: 0; }
  h1 {
    font-size: 3.5rem;
    line-height: 1.04;
    letter-spacing: -0.05em;
    width: 100%;
    max-width: 980px;
    margin-inline: auto;
    background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  h2 {
    font-size: 2.45rem;
    line-height: 1.08;
    letter-spacing: -0.04em;
    width: 100%;
    max-width: 960px;
    margin-inline: auto;
  }
  h3 { font-size: 1.06rem; color: var(--accent); margin-bottom: 10px; }
  p, li { font-size: 1.04rem; line-height: 1.64; color: var(--muted); }
  strong { color: var(--ink); font-weight: 600; }
  code {
    font-family: var(--mono);
    font-size: .92em;
    padding: 2px 6px;
    border-radius: 6px;
    background: rgba(125, 211, 252, 0.08);
    color: var(--accent);
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 1160px;
    margin-inline: auto;
    font-family: var(--mono);
    font-size: .82rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .eyebrow::before {
    content: "";
    width: 34px;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  .subtitle {
    width: 100%;
    max-width: 780px;
    margin-inline: auto;
    font-size: 1.24rem;
    line-height: 1.55;
  }

  .glass, .glass-sm {
    background: var(--glass);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
  }
  .glass { border-radius: 24px; padding: 28px; }
  .glass-sm { border-radius: 18px; padding: 20px 22px; box-shadow: 0 18px 46px rgba(0,0,0,.22); }
  .slide > .glass,
  .slide > .glass-sm,
  .slide > .hero,
  .slide > .grid-2,
  .slide > .grid-3,
  .slide > .grid-4,
  .slide > .timeline,
  .slide > .band,
  .slide > .compare,
  .slide > .metrics,
  .slide > .flow,
  .slide > .tags {
    margin-inline: auto;
  }

  .grid-2, .grid-3, .grid-4, .timeline, .band, .compare, .metrics {
    display: grid;
    gap: 16px;
    width: 100%;
    max-width: 1160px;
  }
  .grid-2, .compare { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .grid-3, .metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .grid-4, .timeline, .band { grid-template-columns: repeat(4, minmax(0, 1fr)); }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(360px, .95fr);
    gap: 28px;
    align-items: center;
    width: 100%;
    max-width: 1160px;
  }

  .bullets { list-style: none; padding: 0; display: grid; gap: 12px; }
  .bullets li { position: relative; padding-left: 22px; }
  .bullets li::before {
    content: "▸";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }

  .metric-card { text-align: center; display: grid; gap: 8px; }
  .metric-num { font-size: 2.7rem; line-height: 1; font-weight: 700; color: var(--accent-2); }

  .timeline-card { position: relative; overflow: hidden; }
  .timeline-card::after {
    content: "";
    position: absolute;
    right: -18px;
    bottom: -26px;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(125, 211, 252, .12), transparent 70%);
  }
  .timeline-year { font-family: var(--mono); font-size: .82rem; color: var(--accent); margin-bottom: 10px; }

  .stage-pill {
    padding: 13px 14px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.04);
    text-align: center;
    font-family: var(--mono);
    font-size: .84rem;
    color: var(--muted);
    animation: stage-glow 8s ease-in-out infinite;
  }
  .stage-pill:nth-child(2) { animation-delay: 2s; }
  .stage-pill:nth-child(3) { animation-delay: 4s; }
  .stage-pill:nth-child(4) { animation-delay: 6s; }

  .flow {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 12px;
    align-items: center;
    width: 100%;
    max-width: 1120px;
  }
  .flow-box {
    min-height: 92px;
    padding: 16px;
    border-radius: 18px;
    border: 1px solid var(--line);
    background: var(--glass);
    display: grid;
    place-items: center;
    text-align: center;
  }
  .flow-box strong { display: block; margin-bottom: 5px; }
  .arrow {
    position: relative;
    height: 2px;
    background: linear-gradient(90deg, rgba(125,211,252,.18), rgba(125,211,252,.95));
  }
  .arrow::after {
    content: "";
    position: absolute;
    right: -1px;
    top: -4px;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-left: 8px solid var(--accent);
  }
  .pulse {
    position: absolute;
    top: -3px;
    left: 0;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-2);
    box-shadow: 0 0 0 6px rgba(94,234,212,.16);
    animation: pulse-run 3.2s ease-in-out infinite;
  }

  .meter-track {
    position: relative;
    height: 12px;
    border-radius: 999px;
    background: rgba(255,255,255,.07);
    overflow: hidden;
  }
  .meter-fill {
    position: absolute;
    inset: 0 auto 0 0;
    width: 40%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--good), var(--accent));
    animation: fill-loop 6s ease-in-out infinite;
  }
  .meter-threshold {
    position: absolute;
    left: 78%;
    top: -5px;
    bottom: -5px;
    width: 2px;
    background: rgba(253, 164, 175, 0.9);
  }
  .meter-labels {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 10px;
    font-family: var(--mono);
    font-size: .82rem;
    color: var(--muted);
  }

  .line-list { display: grid; gap: 8px; margin-top: 14px; }
  .line {
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,.04);
    font-family: var(--mono);
    font-size: .82rem;
    line-height: 1.45;
    color: var(--ink);
  }
  .line.old { animation: fade-old 6s ease-in-out infinite; }
  .line.reveal { animation: reveal-line 6s ease-in-out infinite; }

  .terminal {
    padding: 0;
    overflow: hidden;
  }
  .terminal-top {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,.03);
  }
  .terminal-top span {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .terminal-body {
    padding: 18px;
    min-height: 230px;
    display: grid;
    gap: 6px;
    font-family: var(--mono);
    font-size: .8rem;
  }
  .terminal-line {
    opacity: 0;
    transform: translateY(8px);
    animation: line-in 5.2s linear infinite;
  }
  .terminal-line:nth-child(1) { animation-delay: .1s; }
  .terminal-line:nth-child(2) { animation-delay: .5s; }
  .terminal-line:nth-child(3) { animation-delay: .9s; }
  .terminal-line:nth-child(4) { animation-delay: 1.3s; }
  .terminal-line:nth-child(5) { animation-delay: 1.7s; }
  .terminal-line:nth-child(6) { animation-delay: 2.1s; }
  .terminal-line:nth-child(7) { animation-delay: 2.5s; }

  .tags { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; width: 100%; max-width: 1160px; }
  .tag {
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(125, 211, 252, 0.08);
    color: var(--accent);
    font-size: .9rem;
  }

  .progress {
    position: fixed;
    left: 0;
    bottom: 0;
    height: 3px;
    width: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
    z-index: 50;
    transition: width .4s ease;
  }
  .counter, .nav-hint {
    position: fixed;
    bottom: 16px;
    z-index: 40;
    font-family: var(--mono);
    font-size: .82rem;
    color: rgba(238,245,255,.55);
  }
  .counter { right: 24px; }
  .nav-hint { left: 24px; }

  .mini-flow {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 1120px;
    margin-inline: auto;
  }

  .mini-card {
    padding: 18px 18px;
    border-radius: 18px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.04);
    min-height: 120px;
    display: grid;
    align-content: start;
    gap: 8px;
  }

  .mini-card strong {
    display: block;
    font-size: .94rem;
    color: var(--ink);
  }

  .mini-card span {
    display: block;
    font-size: .96rem;
    line-height: 1.55;
    color: var(--muted);
  }

  .approval-grid {
    display: grid;
    grid-template-columns: 1.1fr .9fr;
    gap: 16px;
    width: 100%;
    max-width: 1120px;
    margin-inline: auto;
  }

  .scan-card {
    display: grid;
    grid-template-columns: 148px minmax(0, 1fr);
    gap: 18px;
    align-items: center;
    padding: 18px;
    border-radius: 22px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.04);
    margin-top: 16px;
  }

  .scan-qr {
    width: 148px;
    height: 148px;
    padding: 10px;
    border-radius: 18px;
    background: rgba(255,255,255,.96);
    box-shadow: 0 18px 40px rgba(0,0,0,.18);
  }

  .scan-qr img {
    display: block;
    width: 100%;
    height: 100%;
  }

  .scan-copy {
    display: grid;
    gap: 8px;
  }

  .scan-copy a {
    color: var(--accent);
    text-decoration: none;
    word-break: break-word;
  }

  .scan-copy a:hover {
    text-decoration: underline;
  }

  .process-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    width: 100%;
    max-width: 1120px;
    margin-inline: auto;
  }

  .process-card {
    position: relative;
    overflow: hidden;
    min-height: 210px;
  }

  .process-card::after {
    content: "";
    position: absolute;
    inset: auto -20px -30px auto;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(125, 211, 252, 0.14), transparent 72%);
    pointer-events: none;
  }

  .tool-cloud,
  .window-stack,
  .skill-pipeline {
    display: grid;
    gap: 10px;
    margin-top: 14px;
  }

  .tool-cloud {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .tool-chip {
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.04);
    font-family: var(--mono);
    font-size: .8rem;
    color: var(--muted);
    opacity: .46;
    transform: scale(.98);
    animation: tool-chip-cycle 6.4s ease-in-out infinite;
  }

  .tool-chip:nth-child(2) { animation-delay: .5s; }
  .tool-chip:nth-child(3) { animation-delay: 1s; }
  .tool-chip:nth-child(4) { animation-delay: 1.5s; }
  .tool-chip:nth-child(5) { animation-delay: 2s; }
  .tool-chip:nth-child(6) { animation-delay: 2.5s; }

  .window-line,
  .handoff-line,
  .skill-step {
    padding: 11px 12px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.04);
    font-size: .88rem;
    line-height: 1.5;
    color: var(--muted);
  }

  .window-line {
    opacity: 0;
    transform: translateY(8px);
    animation: stage-line-cycle 6s ease-in-out infinite;
  }

  .window-line:nth-child(1) { animation-delay: .1s; }
  .window-line:nth-child(2) { animation-delay: 1.2s; }
  .window-line:nth-child(3) { animation-delay: 2.3s; }

  .handoff-stage {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 64px minmax(0, 1fr);
    gap: 14px;
    align-items: center;
    width: 100%;
    max-width: 1120px;
    margin-inline: auto;
  }

  .handoff-arrow {
    position: relative;
    width: 64px;
    height: 2px;
    background: linear-gradient(90deg, rgba(94,234,212,.12), rgba(94,234,212,.94));
  }

  .handoff-arrow::after {
    content: "";
    position: absolute;
    right: -1px;
    top: -4px;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-left: 8px solid var(--accent-2);
  }

  .handoff-arrow::before {
    content: "";
    position: absolute;
    top: -3px;
    left: 0;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-2);
    box-shadow: 0 0 0 6px rgba(94,234,212,.14);
    animation: pulse-run 3.2s ease-in-out infinite;
  }

  .handoff-line {
    opacity: 0;
    transform: translateY(8px);
    animation: handoff-reveal 6.2s ease-in-out infinite;
  }

  .handoff-line:nth-child(1) { animation-delay: .15s; }
  .handoff-line:nth-child(2) { animation-delay: 1.25s; }
  .handoff-line:nth-child(3) { animation-delay: 2.4s; }
  .handoff-line:nth-child(4) { animation-delay: 3.7s; }

  .skill-step {
    position: relative;
    opacity: .52;
    animation: skill-stage-cycle 7s ease-in-out infinite;
  }

  .skill-step:nth-child(2) { animation-delay: 1.6s; }
  .skill-step:nth-child(3) { animation-delay: 3.2s; }
  .skill-step:nth-child(4) { animation-delay: 4.8s; }

  .skill-step strong {
    display: block;
    margin-bottom: 6px;
    color: var(--ink);
  }

  .approval-list {
    display: grid;
    gap: 10px;
    margin-top: 14px;
  }

  .approval-item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
    padding: 11px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,.04);
    font-size: .9rem;
    color: var(--ink);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 88px;
    min-height: 30px;
    padding: 5px 10px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: .78rem;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.04);
    color: var(--muted);
  }

  .badge.allow {
    color: var(--good);
    border-color: rgba(134,239,172,.26);
    background: rgba(134,239,172,.09);
  }

  .badge.pending {
    color: var(--warn);
    border-color: rgba(253,164,175,.24);
    background: rgba(253,164,175,.09);
  }

  .badge.block {
    color: var(--muted);
  }

  @keyframes pulse-run {
    0% { left: 0%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { left: calc(100% - 8px); opacity: 0; }
  }
  @keyframes fill-loop {
    0%,18% { width: 38%; background: linear-gradient(90deg, var(--good), var(--accent)); }
    45%,58% { width: 92%; background: linear-gradient(90deg, var(--warn), #fb7185); }
    100% { width: 43%; background: linear-gradient(90deg, var(--good), var(--accent)); }
  }
  @keyframes fade-old {
    0%,42% { opacity: 1; max-height: 80px; padding-top: 10px; padding-bottom: 10px; }
    64%,100% { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; overflow: hidden; }
  }
  @keyframes reveal-line {
    0%,56% { opacity: 0; transform: translateY(8px); }
    72%,100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes line-in {
    0%,100% { opacity: 0; transform: translateY(8px); }
    8%,24% { opacity: 1; transform: translateY(0); }
  }
  @keyframes stage-glow {
    0%,20%,100% { border-color: var(--line); color: var(--muted); box-shadow: none; background: rgba(255,255,255,.04); }
    24%,46% { border-color: rgba(94,234,212,.34); color: var(--ink); box-shadow: 0 0 0 1px rgba(94,234,212,.18), 0 12px 30px rgba(94,234,212,.12); background: rgba(94,234,212,.08); }
  }
  @keyframes tool-chip-cycle {
    0%,100% { opacity: .42; transform: scale(.98); color: var(--muted); border-color: var(--line); background: rgba(255,255,255,.04); }
    18%,42% { opacity: 1; transform: scale(1); color: var(--ink); border-color: rgba(125,211,252,.3); background: rgba(125,211,252,.1); box-shadow: 0 14px 32px rgba(125,211,252,.12); }
  }
  @keyframes stage-line-cycle {
    0%,100% { opacity: 0; transform: translateY(8px); }
    14%,54% { opacity: 1; transform: translateY(0); }
  }
  @keyframes handoff-reveal {
    0%,100% { opacity: 0; transform: translateY(8px); }
    12%,64% { opacity: 1; transform: translateY(0); }
  }
  @keyframes skill-stage-cycle {
    0%,100% { opacity: .48; transform: translateY(0); border-color: var(--line); background: rgba(255,255,255,.04); }
    18%,38% { opacity: 1; transform: translateY(-2px); border-color: rgba(94,234,212,.28); background: rgba(94,234,212,.1); box-shadow: 0 12px 28px rgba(94,234,212,.1); }
  }

  @media (max-width: 1100px) {
    .slide { padding: 40px 32px 66px; }
    .hero, .grid-2, .grid-3, .grid-4, .timeline, .band, .compare, .metrics, .flow, .mini-flow, .approval-grid, .process-grid, .handoff-stage, .scan-card { grid-template-columns: 1fr; }
    .scan-card { justify-items: center; text-align: center; }
    .handoff-arrow { width: 100%; }
    h1 { font-size: 2.85rem; }
    h2 { font-size: 2.05rem; }
  }
</style>
</head>
<body>
<div class="deck" id="deck">
</div>

  const deck = document.getElementById("deck");
  deck.innerHTML = slidesMarkup.join("");

  const slides = Array.from(document.querySelectorAll(".slide"));
  const total = slides.length;
  const progress = document.getElementById("progress");
  const counter = document.getElementById("counter");
  let current = 0;

  function syncUi() {
    counter.textContent = `${current + 1} / ${total}`;
    progress.style.width = `${(current / Math.max(total - 1, 1)) * 100}%`;
  }

  function go(nextIndex) {
    if (nextIndex < 0 || nextIndex >= total || nextIndex === current) return;
    const oldSlide = slides[current];
    const nextSlide = slides[nextIndex];
    const dir = nextIndex > current ? "forward" : "backward";

    slides.forEach((slide) => slide.classList.remove("active", "exit-left", "exit-right", "enter-left"));
    oldSlide.classList.add(dir === "forward" ? "exit-left" : "exit-right");
    nextSlide.classList.add("active");
    if (dir === "backward") nextSlide.classList.add("enter-left");

    current = nextIndex;
    syncUi();

    setTimeout(() => {
      slides.forEach((slide, index) => {
        if (index !== current) slide.classList.remove("active", "exit-left", "exit-right", "enter-left");
      });
    }, 500);
  }

  document.addEventListener("keydown", (event) => {
    if (["ArrowRight", "ArrowDown", "PageDown", " "].includes(event.key)) {
      event.preventDefault();
      go(current + 1);
    }
    if (["ArrowLeft", "ArrowUp", "PageUp"].includes(event.key)) {
      event.preventDefault();
      go(current - 1);
    }
    if (event.key === "Home") {
      event.preventDefault();
      go(0);
    }
    if (event.key === "End") {
      event.preventDefault();
      go(total - 1);
    }
  });

  let touchStartX = null;
  document.addEventListener("touchstart", (event) => {
    touchStartX = event.changedTouches[0].clientX;
  }, { passive: true });

  document.addEventListener("touchend", (event) => {
    if (touchStartX == null) return;
    const deltaX = event.changedTouches[0].clientX - touchStartX;
    if (Math.abs(deltaX) > 50) {
      if (deltaX < 0) go(current + 1);
      if (deltaX > 0) go(current - 1);
    }
    touchStartX = null;
  }, { passive: true });

  syncUi();
</script>
